/* energy_chain.proto */

syntax = "proto3";

/**
* --- Enums ---
*/

/**
* This is used to determine whether the OrderTx is pushing energy into the grid,
* (PUSH), or pulling energy from the grid (PULL).
*/
enum OrderType {
  PUSH = 0; /* producer is selling energy */
  PULL = 1; /* consumer is buying energy */
}

/**
* --- Models ---
*/

/* Block */
message Block {
  Header header = 1;
  repeated Transaction transactions = 2; /* transactions in the block */
}

/* Header */
message Header {
  uint32 version = 1;
  string hash_prev_block = 2;  /* hex string */
  string hash_merkle_root = 3; /* hex string */
  uint64 timestamp = 4;
  uint32 bits = 5; /* difficulty target */
  uint32 nonce = 6;
  uint64 height = 7;
}

/* Transaction */
message Transaction {
    string transaction_hash = 1; /* hash of the tx payload (hex) */
}

/** GridRateTx 
* Created by the Grid Node to broadcast the current energy rates.
*/
message GridRateTx {
    int64 push_rate = 1; /* price per Watt-hour to buy from Producers (microcoins) */
    int64 pull_rate = 2; /* price per Watt-hour to sell to Consumers (microcoins) */
    uint64 expiry_height = 3; /* block height where these rates expire */
    string grid_address = 4; /* expected GRID_ADDRESS */
    bytes signature = 5; /* ECDSA signature from the Grid node */
}

/** Order Tx
* Created by a User who wants to trade energy.
*/ 
message OrderTx {
    string sender_address = 1;
    OrderType type = 2;
    int64 energy_wh = 3; /* amount of energy (Wh) to push or pull */
    int64 limit_price = 4; /* the maximum pull rate or minimum push rate (microcoins) */
    uint64 nonce = 5; /* account nonce */
    string script = 6; /* stack-based script for the trading constraints */
    bytes signature = 7; /* ECDSA signature */
}

/** TradeTx
* Created by a Miner to confirm trades between Users and the Grid.
*/
message TradeTx {
    string miner_address = 1; /* address of the miner */
    OrderTx order = 2; /* the OrderTx being fulfilled */
    GridRateTx grid_rate = 3; /* the GridRateTx it is executing against */
    int64 miner_fee = 4; /* fee collected by the miner */
    int64_settlement_amount = 5; /* computed settlement (microcoins) */
}

